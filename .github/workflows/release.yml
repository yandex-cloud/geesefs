name: Release

on:
  push:
    tags:
    - "v*"
  workflow_dispatch:

permissions:
  contents: write
  attestations: write

jobs:

  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
            artifact: geesefs-linux-amd64
          - os: ubuntu-latest
            goos: linux
            goarch: arm64
            artifact: geesefs-linux-arm64
          - os: macos-latest
            goos: darwin
            goarch: amd64
            artifact: geesefs-mac-amd64
          - os: macos-latest
            goos: darwin
            goarch: arm64
            artifact: geesefs-mac-arm64
          - os: windows-latest
            goos: windows
            goarch: amd64
            artifact: geesefs-win-x64.exe

    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache-dependency-path: go.sum

      - name: Build
        env:
          CGO_ENABLED: 0
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          output="${{ matrix.artifact }}"
          if [ "${{ matrix.goos }}" = "windows" ]; then
            output="${output}.exe"
          fi
          go build -o "$output" -v .
          echo "output=$output" >> $GITHUB_OUTPUT

      - name: Compute checksums
        run: |
          output="${{ matrix.artifact }}"
          if [ "${{ matrix.goos }}" = "windows" ]; then
            output="${output}.exe"
          fi
          sha256sum "$output" > "${output}.sha256"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            ${{ matrix.artifact }}
            ${{ matrix.artifact }}.sha256
          if-no-files-found: error

  build-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache-dependency-path: go.sum

      - name: Build tests
        run: go test -c ./core -o geesefs-tests-linux-amd64

      - name: Upload tests
        uses: actions/upload-artifact@v4
        with:
          name: geesefs-tests
          path: geesefs-tests-linux-amd64

  release:
    needs: [build, build-tests]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: '*'
          merge-multiple: true

      - name: List artifacts
        run: ls -la

      - name: Create checksums file
        run: |
          cat << 'EOF' > checksums.txt
          # SHA256 checksums for geesefs releases
          # Generated by GitHub Actions
          EOF
          for f in geesefs-*; do
            if [ -f "$f" ] && [ "${f%.sha256}" = "$f" ]; then
              sha256sum "$f" >> checksums.txt
            fi
          done
          cat checksums.txt

      - name: Generate release notes
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          version="${tag#v}"
          cat << EOF > release-notes.md
          # geesefs $version

          Geesefs is a write-optimizing S3/FUSE file system.

          ## Downloads

          | Platform | Architecture | File |
          |----------|--------------|------|
          | Linux | amd64 | geesefs-linux-amd64 |
          | Linux | arm64 | geesefs-linux-arm64 |
          | macOS | amd64 | geesefs-mac-amd64 |
          | macOS | arm64 (Apple Silicon) | geesefs-mac-arm64 |
          | Windows | x64 | geesefs-win-x64.exe |

          ## Checksums

          See \`checksums.txt\` for SHA256 checksums.

          ## Installation

          \`\`\`bash
          # Linux/macOS
          curl -L https://github.com/yandex-cloud/geesefs/releases/download/$tag/geesefs-linux-amd64 -o geesefs
          chmod +x geesefs

          # macOS Apple Silicon
          curl -L https://github.com/yandex-cloud/geesefs/releases/download/$tag/geesefs-mac-arm64 -o geesefs
          chmod +x geesefs

          # Windows
          # Download geesefs-win-x64.exe from releases page
          \`\`\`

          ## Changes

          See [CHANGELOG](https://github.com/yandex-cloud/geesefs/blob/$tag/CHANGELOG.md) for detailed changes.
          EOF

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: ${{ contains(github.ref, 'alpha') || contains(github.ref, 'beta') || contains(github.ref, 'rc') }}
          generate_release_notes: false
          name: ${{ github.ref_name }}
          body_path: release-notes.md
          files: |
            geesefs-*
            checksums.txt
          ATTESTATION: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
