# Samba global configuration for GeeseFS
[global]
   workgroup = WORKGROUP
   netbios name = GEESEFS
   server string = GeeseFS Samba Server
   server role = standalone server
   log file = /var/log/samba/log.%m
   max log size = 1000
   logging = file
   panic action = /usr/share/samba/panic-action %d

   # Disable printing
   load printers = no
   printing = bsd
   printcap name = /dev/null
   disable spoolss = yes

   dns proxy = no

   # SMB protocol - macOS compatibility
   server min protocol = SMB2
   server max protocol = SMB3
   client max protocol = SMB3

   server signing = auto
   client signing = auto

   # macOS Finder compatibility
   unix extensions = no

   # NetBIOS settings for macOS Finder browsing
   local master = yes
   preferred master = yes
   os level = 65
   browse list = yes
   browseable = yes

   # Performance
   socket options = TCP_NODELAY IPTOS_LOWDELAY
   read raw = yes
   write raw = yes
   use sendfile = yes
   aio read size = 16384
   aio write size = 16384
